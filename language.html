<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose a language — Itihasa</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon_192.png">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div id="header-slot"></div>
  <div id="breadcrumb-slot"></div>

  <main>
    <section class="page-hero">
      <span class="page-hero__eyebrow" id="epicEyebrow">Choose a language</span>
      <h1 id="epicTitle">Read in your language</h1>
      <p>Pick the language you'd like to read in — you can switch anytime from the story index.</p>
    </section>

    <section class="grid grid--languages" id="langGrid" aria-label="Language options"></section>

    <div class="back-row">
      <a href="index.html" class="btn btn--ghost" id="backBtn">← Back to all epics</a>
    </div>
  </main>

  <div id="footer-slot"></div>

  <script src="assets/js/site.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const storyId = params.get("story");
    const epic = EPICS[storyId];

    document.getElementById("header-slot").innerHTML = renderHeader({
      backHref: "index.html",
      backLabel: "All epics",
    });

    document.getElementById("breadcrumb-slot").innerHTML = renderBreadcrumb([
      { label: "Home", href: "index.html" },
      { label: epic ? epic.en : "Story" },
    ]);

    if (epic) {
      document.getElementById("epicEyebrow").textContent = `${epic.dev} · ${epic.en}`;
      document.getElementById("epicTitle").textContent = `Read ${epic.en} in your language`;
    }

    document.getElementById("footer-slot").innerHTML = renderFooter();

    const grid = document.getElementById("langGrid");
    Object.entries(LANGUAGES).forEach(([code, lang]) => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = `index_story.html?story=${storyId}&lang=${code}`;
      card.innerHTML = `
        <h2 class="card__title">${lang.label}</h2>
        <p class="card__subtitle">${lang.sub}</p>
      `;
      grid.appendChild(card);
    });
  </script>

</body>
</html>
