<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading — Itihasa</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon_192.png">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div id="header-slot"></div>
  <div id="breadcrumb-slot"></div>

  <main>
    <div class="reader">
      <div class="reader-meta">
        <span id="readerTag">Loading…</span>
        <span id="readerPage"></span>
      </div>
      <div id="storyContent" class="story-text">
        <div class="skeleton" style="height:1.8em;width:70%;margin-bottom:14px;"></div>
        <div class="skeleton" style="height:1em;width:100%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:1em;width:96%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:1em;width:88%;"></div>
      </div>

      <div class="reader-nav">
        <button id="prevBtn" class="btn btn--ghost">← Previous</button>
        <span class="reader-nav__page" id="pageNum">Page 1</span>
        <button id="nextBtn" class="btn btn--primary">Next →</button>
      </div>

      <form class="jump-form" id="jumpForm">
        <label for="jumpInput" class="sr-only">Jump to page</label>
        <input type="number" id="jumpInput" placeholder="Page #" min="1">
        <button type="submit" class="btn btn--ghost">Go</button>
      </form>
    </div>

    <div class="back-row">
      <a href="#" id="backToIndex" class="btn btn--ghost">← Back to chapter index</a>
    </div>
  </main>

  <div id="footer-slot"></div>

  <script src="assets/js/site.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const storyId = params.get("story");
    const language = params.get("lang");
    const section = params.get("section");
    const epic = EPICS[storyId];
    const lang = LANGUAGES[language];

    document.getElementById("header-slot").innerHTML = renderHeader({
      backHref: `index_story.html?story=${storyId}&lang=${language}`,
      backLabel: "Chapters",
      withProgress: true,
    });

    document.getElementById("breadcrumb-slot").innerHTML = renderBreadcrumb([
      { label: "Home", href: "index.html" },
      { label: epic ? epic.en : "Story", href: `language.html?story=${storyId}` },
      { label: lang ? lang.label : "Language", href: `index_story.html?story=${storyId}&lang=${language}` },
      { label: "Reading" },
    ]);

    document.getElementById("footer-slot").innerHTML = renderFooter();
    document.getElementById("backToIndex").href = `index_story.html?story=${storyId}&lang=${language}`;
    document.getElementById("readerTag").textContent = epic ? `${epic.en} · ${lang ? lang.label : ""}` : "Itihasa";

    const storyContent = document.getElementById("storyContent");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageNum = document.getElementById("pageNum");
    const readerPage = document.getElementById("readerPage");
    const jumpForm = document.getElementById("jumpForm");
    const jumpInput = document.getElementById("jumpInput");

    let pages = [];
    let currentPage = 0;

    fetch(`stories/${storyId}/${language}/part${section}.json`)
      .then((res) => {
        if (!res.ok) throw new Error("not found");
        return res.json();
      })
      .then((data) => {
        if (Array.isArray(data) && data.length > 0) {
          pages = data;
          showPage(currentPage);
        } else {
          showUnavailable();
        }
      })
      .catch(() => showUnavailable());

    function showUnavailable() {
      storyContent.innerHTML = `
        <div class="state-panel">
          <div class="state-panel__icon">📜</div>
          <p><strong>This chapter isn't written yet.</strong><br>Please check back soon, or explore another chapter in the index.</p>
        </div>`;
      document.querySelector(".reader-nav").style.display = "none";
      document.getElementById("jumpForm").style.display = "none";
      readerPage.textContent = "";
    }

    function showPage(index) {
      storyContent.innerHTML = formatStoryText(pages[index]);
      pageNum.textContent = `Page ${index + 1} of ${pages.length}`;
      readerPage.textContent = `${index + 1} / ${pages.length}`;
      setHeaderProgress((index + 1) / pages.length);
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === pages.length - 1;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) showPage(--currentPage);
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < pages.length - 1) showPage(++currentPage);
    });

    jumpForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const page = parseInt(jumpInput.value, 10);
      if (!isNaN(page) && page >= 1 && page <= pages.length) {
        currentPage = page - 1;
        showPage(currentPage);
        jumpInput.value = "";
      } else {
        jumpInput.setCustomValidity(`Enter a number between 1 and ${pages.length}`);
        jumpInput.reportValidity();
      }
    });

    jumpInput.addEventListener("input", () => jumpInput.setCustomValidity(""));

    document.addEventListener("keydown", (e) => {
      if (!pages.length) return;
      if (e.key === "ArrowRight" && currentPage < pages.length - 1) showPage(++currentPage);
      if (e.key === "ArrowLeft" && currentPage > 0) showPage(--currentPage);
    });
  </script>

</body>
</html>
