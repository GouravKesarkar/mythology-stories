<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapters — Itihasa</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon_192.png">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div id="header-slot"></div>
  <div id="breadcrumb-slot"></div>

  <main>
    <section class="page-hero">
      <span class="page-hero__eyebrow" id="epicEyebrow">Chapters</span>
      <h1 id="epicTitle">Choose a chapter</h1>
      <p id="epicSub">Every chapter is listed in its original order — start wherever you like.</p>
    </section>

    <section class="grid" id="sectionList" aria-label="Chapters"></section>

    <div class="back-row">
      <a href="#" id="backToLanguage" class="btn btn--ghost">← Change language</a>
    </div>
  </main>

  <div id="footer-slot"></div>

  <script src="assets/js/site.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const storyId = params.get("story");
    const language = params.get("lang");
    const epic = EPICS[storyId];
    const lang = LANGUAGES[language];

    document.getElementById("header-slot").innerHTML = renderHeader({
      backHref: `language.html?story=${storyId}`,
      backLabel: "Language",
    });

    document.getElementById("breadcrumb-slot").innerHTML = renderBreadcrumb([
      { label: "Home", href: "index.html" },
      { label: epic ? epic.en : "Story", href: `language.html?story=${storyId}` },
      { label: lang ? lang.label : "Chapters" },
    ]);

    if (epic) {
      document.getElementById("epicEyebrow").textContent = `${epic.dev} · ${lang ? lang.label : ""}`;
      document.getElementById("epicTitle").textContent = `${epic.en} — chapter index`;
    }

    document.getElementById("footer-slot").innerHTML = renderFooter();
    document.getElementById("backToLanguage").href = `language.html?story=${storyId}`;

    const sectionList = document.getElementById("sectionList");

    // A chapter title may embed its own status, e.g. "Part 1: बालकांड (...): Available"
    function parseChapter(raw) {
      const availableMatch = raw.match(/:\s*Available\s*$/i);
      const soonMatch = raw.match(/:\s*Coming Soon\s*$/i);
      let label = raw.replace(/:\s*(Available|Coming Soon)\s*$/i, "").trim();
      const numberMatch = label.match(/^([A-Za-z]+)\s+(\d+)\s*:\s*/);
      let eyebrow = "";
      if (numberMatch) {
        eyebrow = `${numberMatch[1]} ${numberMatch[2]}`;
        label = label.slice(numberMatch[0].length).trim();
      }
      let status = null;
      if (availableMatch) status = "available";
      if (soonMatch) status = "soon";
      return { eyebrow, label, status };
    }

    fetch(`stories/${storyId}/${language}/index.json`)
      .then((res) => {
        if (!res.ok) throw new Error("not found");
        return res.json();
      })
      .then((data) => {
        const keys = Array.isArray(data) ? data.map((_, i) => i) : Object.keys(data);
        if (keys.length === 0) throw new Error("empty");

        keys.forEach((key) => {
          const raw = Array.isArray(data) ? data[key] : data[key];
          const { eyebrow, label, status } = parseChapter(String(raw));
          const card = document.createElement("a");
          card.className = "card";
          card.href = `story.html?story=${storyId}&lang=${language}&section=${key}`;
          card.innerHTML = `
            <div class="card__top">
              ${eyebrow ? `<span class="card__eyebrow">${eyebrow}</span>` : "<span></span>"}
              ${
                status
                  ? `<span class="badge ${status === "available" ? "badge--available" : "badge--soon"}">
                       ${status === "available" ? "Available" : "Coming soon"}
                     </span>`
                  : ""
              }
            </div>
            <h2 class="card__title">${label}</h2>
          `;
          sectionList.appendChild(card);
        });
      })
      .catch(() => {
        sectionList.outerHTML = `
          <div class="state-panel" role="status">
            <div class="state-panel__icon">📜</div>
            <p><strong>No chapters found yet.</strong><br>This text is still being prepared — please check back soon.</p>
          </div>`;
      });
  </script>

</body>
</html>
