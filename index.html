<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itihasa — Indian Epics Retold</title>
  <meta name="description" content="Read the Ramayana, Mahabharata, Bhagavad Gita and the Puranas retold in Hindi, Marathi and English.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon_192.png">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div id="header-slot"></div>

  <main>
    <section class="page-hero">
      <span class="page-hero__eyebrow">Itihasa · इतिहास</span>
      <h1>Indian epics, retold for today's readers</h1>
      <p>Choose a text below to begin. Every story is retold in Hindi, Marathi and English — a lit lamp means it's ready to read, an unlit one is still being written.</p>
    </section>

    <section class="grid" id="epicGrid" aria-label="Available epics"></section>
  </main>

  <div id="footer-slot"></div>

  <script src="assets/js/site.js"></script>
  <script>
    document.getElementById("header-slot").innerHTML = renderHeader();
    document.getElementById("footer-slot").innerHTML = renderFooter();

    const grid = document.getElementById("epicGrid");
    Object.entries(EPICS).forEach(([id, epic]) => {
      const lit = epic.status === "available";
      const card = document.createElement("a");
      card.className = "card";
      card.href = `language.html?story=${id}`;
      card.innerHTML = `
        <div class="card__top">
          ${diyaIcon(lit)}
          <span class="badge ${lit ? "badge--available" : "badge--soon"}">
            ${lit ? "Available" : "Coming soon"}
          </span>
        </div>
        <h2 class="card__title">${epic.dev}</h2>
        <p class="card__subtitle">${epic.en}</p>
        <p class="card__eyebrow">${epic.tagline}</p>
      `;
      grid.appendChild(card);
    });

    initInstallPrompt();
  </script>

</body>
</html>
